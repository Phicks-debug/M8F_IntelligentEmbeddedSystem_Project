data:
  dir: data/processed/classification_data
  image_size: 224
  num_classes: 8
  workers: 0
  # Mixed precision (MPS/CUDA FP16 autocast). Halves activation memory and
  # is safe at training time (loss gets an autocast-aware scalar). Off by
  # default to keep CPU fallback deterministic; flip to `true` on the M3
  # 16 GB Mac or larger GPU boxes for ~1.5x throughput and ~2x mem savings.
  mixed_precision: true

finetune:
  arch: mobilenetv4_conv_small.e2400_r224_in1k
  batch_size: 32
  epochs: 50
  probe_epochs: 3
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup: 2
  smoothing: 0.0
  # Student-specific overrides (teacher uses the values above).
  student_lr: 5.0e-5
  light_augmentation: true
  student_patience: 15

distill:
  teacher: efficientnet_b3
  student: mobilenetv4_conv_small.e2400_r224_in1k
  batch_size: 32
  epochs: 30
  lr: 5.0e-5
  weight_decay: 1.0e-4
  warmup: 3
  temperature: 6.0
  alpha: 0.5

quantize:
  # Full INT8 (weights + activations) — required for the Hexagon NPU on
  # Meta Ray-Ban's Snapdragon AR1 Gen 1. See PIPELINE.md section 4.
  # Static INT8 is calibrated on validation batches before quantize_.
  backend: torchao_int8_static_activation_int8_weight
  calibration:
    split: val
    batch_size: 8
    batches: 32
  max_onnx_accuracy_drop: 0.05
  snr:
    batch_size: 8
    batches: 16  # cap on calibration batches for SNR (dB) scoring
    min_db: 20.0
    fail_below_min: false

export:
  onnx: true # FP32 intermediate ONNX
  int8_onnx: true # final Ray-Ban NPU deployment ONNX (QDQ INT8)
  opset: 18
  # Compile FP32 ONNX to Hailo Executable Format (.hef) for the Raspberry Pi 5
  # + Hailo HAT+ (Hailo-10H). Compilation runs on an x86 Linux host with the
  # Hailo Dataflow Compiler 5.3.0 SDK; it is NOT installable on macOS/this box.
  # The compiler performs its OWN INT8 quantization, so we feed the FP32 ONNX
  # (NOT the INT8 QDQ ONNX). See docs/hailo_deployment.md for the full flow.
  hailo:
    enabled: true
    hw_arch: hailo10h # MUST be hailo10h for the Pi 5 HAT+; a hailo8/hailo8l
                      # HEF will not load on the Hailo-10H runtime.
    require: false # Raise when SDK missing or compilation fails
    # Calibration data MUST be in the model's input space. This ONNX has no
    # preprocessing baked in, so calibration is ImageNet-normalized NHWC
    # (NOT the lab's [0,1] capture). classification/hailo/build_calib.py builds it.
    calibration:
      split: val # 'train' | 'val' | 'test'
      batch_size: 8
      batches: 32

benchmark:
  batch_size: 64  # inference-only (no backward, no optimizer state), so 64 is safe and amortizes launch overhead
  onnx_runs: 100

paths:
  # data.dir, checkpoint_dir, and export_dir can be local paths or object-store
  # URIs. S3 works as s3://bucket/prefix. Cloudflare R2 can use r2://bucket/prefix
  # with storage_options.client_kwargs.endpoint_url, or s3:// with AWS_ENDPOINT_URL.
  checkpoint_dir: checkpoints
  export_dir: exported_models
  local_cache_dir: .cache/classification
  mlflow_tracking_uri: sqlite:///mlflow.db
  # storage_options:
  #   client_kwargs:
  #     endpoint_url: https://<account-id>.r2.cloudflarestorage.com

device: mps
seed: 67
patience: 10
